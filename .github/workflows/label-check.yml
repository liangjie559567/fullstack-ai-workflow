name: PR Label Check

on:
  pull_request:
    types: [opened, edited, synchronize, labeled, unlabeled]

jobs:
  check-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure at least one release label exists
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name)
            const accepted = ['major','minor','patch']
            const ok = labels.some(l => accepted.includes(l))
            if (!ok) {
              core.setFailed(`PR must include one of: ${accepted.join(', ')}`)
            }
