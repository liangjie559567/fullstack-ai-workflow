name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
no-changes-template: '- No significant changes'
version-resolver:
  major:
    labels:
      - major
      - breaking-change
  minor:
    labels:
      - minor
      - enhancement
      - feature
  patch:
    labels:
      - patch
      - bug
      - docs
      - chore
  default: patch
categories:
  - title: '🚀 Features'
    labels:
      - feature
      - enhancement
  - title: '🐛 Fixes'
    labels:
      - bug
  - title: '🧱 Templates'
    labels:
      - templates
  - title: '🛠 Scripts'
    labels:
      - scripts
  - title: '📚 Docs'
    labels:
      - docs
  - title: '⚠ Breaking Changes'
    labels:
      - breaking-change
change-title-escapes: '\<*_&'
template: |
  ## What changed

  $CHANGES

  ## Upgrade notes

  - Review `CHANGELOG.md`
  - Compare `templates/` diffs before applying to existing projects
  - If needed, pin the new tag in `workflow-repos.manifest.json`
